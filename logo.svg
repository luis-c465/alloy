<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="left-leg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#71717A" />
      <stop offset="100%" stop-color="#27272A" />
    </linearGradient>

    <linearGradient id="left-leg-shine-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FEF08A" stop-opacity="0.6" />
      <stop offset="20%" stop-color="#F59E0B" stop-opacity="0.4" />
      <stop offset="60%" stop-color="#EA580C" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#7F1D1D" stop-opacity="0.1" />
    </linearGradient>

    <linearGradient id="right-leg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FEF08A" />
      <stop offset="20%" stop-color="#F59E0B" />
      <stop offset="60%" stop-color="#EA580C" />
      <stop offset="100%" stop-color="#7F1D1D" />
    </linearGradient>

    <linearGradient id="white-core-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1" />
      <stop offset="25%" stop-color="#FEF08A" stop-opacity="0.8" />
      <stop offset="80%" stop-color="#EA580C" stop-opacity="0" />
    </linearGradient>

    <linearGradient id="crossbar-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3F3F46" />
      <stop offset="50%" stop-color="#71717A" />
      <stop offset="100%" stop-color="#EA580C" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g transform="translate(0, -6)">
    <path d="M 140 290 L 332 290" fill="none" stroke="url(#crossbar-grad)" stroke-width="56"
      stroke-linecap="round" />

    <path d="M 256 120 L 140 380" fill="none" stroke="url(#left-leg-grad)" stroke-width="72"
      stroke-linecap="round" />

    <path d="M 256 120 L 140 380" fill="none" stroke="url(#left-leg-shine-grad)" stroke-width="72"
      stroke-linecap="round" />

    <g filter="url(#glow)">
      <path d="M 256 120 L 372 380" fill="none" stroke="url(#right-leg-grad)" stroke-width="72"
        stroke-linecap="round" opacity="0.8" />

      <rect x="330" y="160" width="20" height="20" rx="4" transform="rotate(45 340 170)"
        fill="#FEF08A" />
      <rect x="368" y="233" width="14" height="14" rx="3" transform="rotate(45 375 240)"
        fill="#F59E0B" />
      <rect x="400" y="305" width="10" height="10" rx="2" transform="rotate(45 405 310)"
        fill="#EA580C" />
    </g>

    <path d="M 256 120 L 372 380" fill="none" stroke="url(#right-leg-grad)" stroke-width="72"
      stroke-linecap="round" />

    <path d="M 256 120 L 372 380" fill="none" stroke="url(#white-core-grad)" stroke-width="16"
      stroke-linecap="round" />

    <rect x="330" y="160" width="20" height="20" rx="4" transform="rotate(45 340 170)"
      fill="#fffad6" />
    <rect x="368" y="233" width="14" height="14" rx="3" transform="rotate(45 375 240)"
      fill="#FEF08A" />
    <rect x="400" y="305" width="10" height="10" rx="2" transform="rotate(45 405 310)"
      fill="#F59E0B" />
  </g>
</svg>
